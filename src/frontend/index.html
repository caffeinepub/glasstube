<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ModxTube</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="transparent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ModxTube" />
    <link rel="apple-touch-icon" href="/assets/uploads/IMG_20260314_072526-1-1.png" />
    <style>
      /* Lock page: no zoom, no overscroll, no bounce */
      html {
        height: 100%;
        overflow: hidden;
      }
      body {
        height: 100%;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
        overflow-x: hidden;
        overflow-y: auto;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      * {
        -webkit-tap-highlight-color: transparent;
        touch-action: pan-y;
      }
      input, textarea {
        touch-action: auto;
        user-select: text;
        -webkit-user-select: text;
      }
      #root {
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
      }

      // Prevent pinch-to-zoom only (viewport user-scalable=no handles double-tap zoom)
      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });
    </script>
  </body>
</html>
